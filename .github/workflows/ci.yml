name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          enable-cache: false

      - name: Install
        run: uv pip install --system -e ".[dev,pydanticai,faiss]"

      - name: Audit dependencies
        run: |
          uv pip install --system pip-audit
          pip-audit

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy --config-file pyproject.mypy.ini .

      - name: Test with coverage
        run: pytest --cov=agent_registry_router --cov-report=term --cov-fail-under=85

      - name: Build (sdist + wheel)
        run: |
          uv pip install --system build
          python -m build


